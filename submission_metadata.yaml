ai_usage_summary: |
  Used Claude/Gemini to discuss overall system design, debug logic rules, and refactor code structure to meet performance constraints. No candidate profile data was submitted to external API endpoints during the scoring process.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  A highly optimized heuristic ranking pipeline designed to execute within 15 seconds. Relies on detailed skill duration parsing, current/past company tier classification (prioritizing product companies over services/consulting), role description keyword hits (shipper vs. researcher), and location/relocation preferences. Incorporates robust honeypot detection to isolate anomalous synthetic profiles (such as impossible skill durations or work history predating company founding dates) and assigns them a zero score.

